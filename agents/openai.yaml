interface:
  display_name: "Professional Article Writer"
  short_description: "调研优先、单篇深写、humanizer 人类化、至少两图、输出 HTML 审核页"
  default_prompt: "Use $pro-article-writer to turn the user's topic, direction, and rough idea into one deeply researched, humanized illustrated article. Search first, record sources and an outline, plan at least 2 images, write the article, apply the bundled humanizer pass, generate images, then emit review.single.html plus artifacts.json for runtime delivery."

policy:
  allow_implicit_invocation: true
